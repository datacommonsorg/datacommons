# The Architecture (Port Map)
# Public Ingress (Cloud Run): Port 8080 (Handled by Main Router)
# Internal Sidecars (Localhost):
#  - DCP API: Port 5000
#  - MCP: Port 8082
#  - Legacy Envoy: Port 8081 (Handles gRPC & /core/api/)
#  - Legacy Mixer: Port 8084 (Background)
#  - Legacy NL Server: Port 6060
#  - Legacy Web App: Port 3000


events {
    worker_connections 1024;
}

http {
    keepalive_timeout 65;
    sendfile on;

    # -------------------------------------------------------------------------
    # UPSTREAM DEFINITIONS (The "Internal Phonebook")
    # -------------------------------------------------------------------------
    upstream legacy_web   { server 127.0.0.1:3000; } # Python Web App
    upstream dcp  { server 127.0.0.1:5000; } # DCP API
    upstream legacy_envoy { server 127.0.0.1:8081; } # Envoy (gRPC + Mixer API)
    upstream legacy_mcp   { server 127.0.0.1:8082; } # MCP Server

    server {
        listen 8080 http2; # Public Ingress (Must be 8080)

        # ---------------------------------------------------------------------
        # 1. DCP API (Port 5000)
        # ---------------------------------------------------------------------
        # Routes starting with /dcp/ go to the DCP container, stripped of /dcp/
        location ^~ /dcp/ {
            proxy_pass http://dcp/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        # ---------------------------------------------------------------------
        # 2. LEGACY MIXER / ENVOY (Port 8081)
        # ---------------------------------------------------------------------
        # Both gRPC and REST requests for Mixer go through Envoy
        
        # REST API
        location ^~ /core/api/ {
            # CORS Preflight
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,X-Requested-With' always;
                add_header 'Access-Control-Max-Age' 3600;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                return 204;
            }

            rewrite ^/core/api/(.*) /$1 break;
            proxy_pass http://legacy_envoy; 
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        # gRPC Traffic (Specific Service)
        location /google.datacommons.v1.Mixer/ {
            grpc_pass grpc://legacy_envoy;
            grpc_set_header Host $host;
        }

        # ---------------------------------------------------------------------
        # 3. LEGACY MCP SERVER (Port 8082)
        # ---------------------------------------------------------------------
        location /mcp {
            proxy_pass http://legacy_mcp;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off; # Required for SSE
        }

        # ---------------------------------------------------------------------
        # 4. LEGACY WEB APP (Port 3000) - Default Fallback
        # ---------------------------------------------------------------------
        location / {
            proxy_pass http://legacy_web;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
        }
    }
}