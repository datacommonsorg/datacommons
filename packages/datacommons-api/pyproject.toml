[project]
name = "datacommons-api"
dynamic = ["version"]
description = 'Data Commons API'
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"
keywords = []
authors = []
urls = {Homepage = "https://github.com/datacommonsorg/datacommons"}
dependencies = [
  "fastapi>=0.95.0",
  "uvicorn[standard]>=0.22.0",
  "sqlalchemy>=2.0.0",
  "pydantic>=2.0.0",
  "click>=8.1.7",
  "datacommons-db",
  "datacommons-schema",
  "sqlalchemy-spanner>=1.17.2",
  "python-dotenv>=1.2.1",
  "requests>=2.31.0",
]

[project.scripts]
datacommons-api = "datacommons_api.api_cli:api"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "httpx>=0.24.0",
    "pytest-asyncio>=0.23.0",
]

[build-system]
requires = ["uv", "setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
include-package-data = true

[tool.setuptools.dynamic]
version = {attr = "datacommons_api.__version__"}


