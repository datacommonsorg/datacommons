# To run this build manually from the datacommons/ project root:
# gcloud builds submit --config build/cloudbuild.yaml .
#
# To override the tag:
# gcloud builds submit --config build/cloudbuild.yaml --substitutions=_IMAGE_TAG="dcp-dev-01" .

substitutions:
  _IMAGE_TAG: 'latest'

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'us-docker.pkg.dev/datcom-ci/gcr.io/datacommons-platform:$_IMAGE_TAG'
      - '-t'
      - 'us-docker.pkg.dev/datcom-ci/gcr.io/datacommons-platform:$SHORT_SHA'
      - '-f'
      - 'build/Dockerfile'
      - '.'

images:
  - 'us-docker.pkg.dev/datcom-ci/gcr.io/datacommons-platform:$_IMAGE_TAG'
  - 'us-docker.pkg.dev/datcom-ci/gcr.io/datacommons-platform:$SHORT_SHA'