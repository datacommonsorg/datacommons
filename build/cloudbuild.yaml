steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'us-docker.pkg.dev/datcom-ci/gcr.io/datacommons-platform:latest'
      - '-t'
      - 'us-docker.pkg.dev/datcom-ci/gcr.io/datacommons-platform:$SHORT_SHA'
      - '-f'
      - 'build/Dockerfile'
      - '.'

images:
  - 'us-docker.pkg.dev/datcom-ci/gcr.io/datacommons-platform:latest'
  - 'us-docker.pkg.dev/datcom-ci/gcr.io/datacommons-platform:$SHORT_SHA'