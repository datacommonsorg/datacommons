steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/datcom-ci/datacommons-platform:latest'
      - '-t'
      - 'gcr.io/datcom-ci/datacommons-platform:$COMMIT_SHA'
      - '-f'
      - 'build/Dockerfile'
      - '.'

images:
  - 'gcr.io/datcom-ci/datacommons-platform:latest'
  - 'gcr.io/datcom-ci/datacommons-platform:$COMMIT_SHA'