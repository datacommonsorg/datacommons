services:
  spanner:
    image: ${SPANNER_IMAGE:-us-docker.pkg.dev/spanner-omni/images/spanner-omni:2026.r1-beta.2}
    container_name: itest-spanner
    ports:
      - "${SPANNER_GRPC_PORT:-9010}:${SPANNER_INTERNAL_GRPC_PORT:-15000}"
      - "${SPANNER_REST_PORT:-9020}:${SPANNER_INTERNAL_REST_PORT:-15020}"
    command: ${SPANNER_COMMAND:-start-single-server}
    networks:
      - test-network
  gcs:
    image: fsouza/fake-gcs-server:1.47.8
    container_name: itest-gcs
    ports:
      - "9099:9099"
    command: -scheme http -port 9099 -data /data
    volumes:
      - ./gcs_seed:/data
    networks:
      - test-network


  ingestion-helper:
    image: ${HELPER_IMAGE:-gcr.io/datcom-ci/datacommons-ingestion-helper:latest}
    platform: linux/amd64
    container_name: itest-ingestion-helper
    ports:
      - "${HELPER_PORT:-8081}:8080"
    volumes:
      - ./patch_credentials.py:/app/patch/sitecustomize.py
    environment:
      - PYTHONPATH=/app/patch
      - PORT=8080
      - SPANNER_EMULATOR_HOST=spanner:${SPANNER_INTERNAL_GRPC_PORT:-15000}
      - STORAGE_EMULATOR_HOST=http://gcs:9099
      - OUTPUT_DIR=gs://test-bucket/output
      - PROJECT_ID=default
      - SPANNER_PROJECT_ID=default
      - SPANNER_INSTANCE_ID=default
      - SPANNER_DATABASE_ID=test-db
      - SPANNER_GRAPH_DATABASE_ID=test-db
    depends_on:
      - spanner
    networks:
      - test-network
    extra_hosts:
      - "metadata.google.internal:127.0.0.1"


  website:
    # Use latest services to run tests on head code.
    image: ${SERVICES_IMAGE:-gcr.io/datcom-ci/datacommons-services:latest}
    platform: linux/amd64
    container_name: itest-website
    ports:
      - "${WEBSITE_PORT:-8082}:8080"
    volumes:
      - ./patch_credentials.py:/workspace/patch/sitecustomize.py
      - ./custom_feature_flags.yaml:/workspace/deploy/featureflags/custom.yaml
    environment:
      - PYTHONPATH=/workspace/patch
      - PORT=8080
      - SPANNER_EMULATOR_HOST=spanner:${SPANNER_INTERNAL_GRPC_PORT:-15000}
      - STORAGE_EMULATOR_HOST=http://gcs:9099
      - OUTPUT_DIR=gs://test-bucket/output
      - RESOLVE_WITH_SPANNER_EMBEDDINGS=true
      - PROJECT_ID=default
      - GCP_PROJECT_ID=default
      - GCP_SPANNER_INSTANCE_ID=default
      - GCP_SPANNER_DATABASE_NAME=test-db
      - USE_SPANNER_GRAPH=true
      - DC_SEARCH_SCOPE=custom_only
      - DC_API_KEY=dummy-key
      - MAPS_API_KEY=dummy-maps-key
      - DC_API_ROOT=
      - ENABLE_MODEL=true
      - NL_SERVICE_ROOT_URL=http://mock-nl-server:6060
    depends_on:
      - spanner
      - mock-nl-server
    networks:
      - test-network
    extra_hosts:
      - "metadata.google.internal:127.0.0.1"

  mock-nl-server:
    image: python:3.11-slim
    container_name: itest-mock-nl-server
    volumes:
      - ./mock_nl_server.py:/app/mock_nl_server.py
    command: python /app/mock_nl_server.py
    networks:
      - test-network

networks:
  test-network:
    name: itest-net
    driver: bridge
